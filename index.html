<!DOCTYPE html>
<html>
<head>

}

    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}
</style>

</head>
<body>

<a href="https://www.yahoo.com">
<button id="ctaYahoo" class="btn">Go to Yahoo</button>
</a>

<a href="https://www.bing.com">
<button id="ctaBing" class="btn">Go to Bing</button>
</a>

</body>
</html>
